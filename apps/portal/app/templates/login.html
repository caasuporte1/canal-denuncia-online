{% extends "base.html" %}
{% block title %}Login empresa{% endblock %}
{% block content %}
<section class="panel">
  <span class="status-badge">Acesso restrito</span>
  <h1>Área da empresa e Admin Triton</h1>
  <p class="muted">Entre com seu e-mail corporativo e senha cadastrada.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/auth/login">
    <label for="email">E-mail</label>
    <input name="email" id="email" type="email" autocomplete="email" required>
    <label for="password">Senha</label>
    <input name="password" id="password" type="password" autocomplete="current-password" required>
    <button type="submit">Entrar</button>
  </form>
</section>
{% endblock %}
