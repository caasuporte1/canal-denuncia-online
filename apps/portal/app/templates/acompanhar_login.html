{% extends "base.html" %}
{% block title %}Acompanhar denuncia{% endblock %}
{% block content %}
<section class="panel">
  <h1>Acompanhar denuncia</h1>
  <p class="warning">Por seguranca, apos 30 minutos de inatividade o acesso sera encerrado.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/acompanhar/login">
    <label>Protocolo</label>
    <input name="protocol" autocomplete="off" required>
    <label>Login</label>
    <input name="login" autocomplete="off" required>
    <label>Senha</label>
    <input name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Acessar acompanhamento</button>
  </form>
</section>
{% endblock %}
